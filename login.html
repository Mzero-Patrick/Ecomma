<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Ecomma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-page__bg"></div>

  <main class="auth-page__main">
    <a href="index.html" class="logo auth-page__logo" id="authLogo">
      <span class="logo__icon">E</span>
      <span class="logo__text">Ecomma</span>
    </a>

    <div class="auth-card">
      <div class="auth-card__header">
        <h1 id="loginTitle">Welcome back</h1>
        <p>Sign in to your Ecomma account</p>
      </div>

      <form id="loginForm" class="auth-card__form">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" required placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <div class="role-selector" id="loginRoleSelector">
          <span class="role-selector__label">Sign in as</span>
          <div class="role-selector__options">
            <label class="role-option">
              <input type="radio" name="loginRole" value="user" checked>
              <span class="role-option__box">
                <span class="role-option__icon">🛍️</span>
                <span class="role-option__text">
                  <strong>Shopper</strong>
                  <small>Browse & buy</small>
                </span>
              </span>
            </label>
            <label class="role-option">
              <input type="radio" name="loginRole" value="seller">
              <span class="role-option__box">
                <span class="role-option__icon">🏪</span>
                <span class="role-option__text">
                  <strong>Seller</strong>
                  <small>Manage your shop</small>
                </span>
              </span>
            </label>
          </div>
        </div>

        <div class="form-group admin-login-panel" id="adminLoginPanel" hidden>
          <div class="admin-login-panel__badge">Admin Access</div>
          <p class="admin-login-panel__hint">Platform administrator sign-in</p>
        </div>

        <button type="submit" class="btn btn--primary btn--block" id="loginSubmit">Sign In</button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="register.html">Register</a>
      </p>
      <p class="auth-switch">
        <a href="index.html">← Back to marketplace</a>
      </p>
    </div>

    <p class="auth-page__footer" id="adminTrigger">© 2026 Ecomma. Built for Rwanda.</p>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/api-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      'use strict';

      const $ = (sel) => document.querySelector(sel);
      let adminRevealed = false;
      let logoClicks = 0;
      let logoClickTimer = null;

      function showToast(message) {
        const toast = $('#toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2800);
      }

      function revealAdmin() {
        adminRevealed = true;
        $('#adminLoginPanel').hidden = false;
        $('#loginTitle').textContent = 'Admin sign in';
        document.querySelector('.auth-card__header p').textContent = 'Platform administrator access';
        showToast('Admin entrance unlocked');
      }

      $('#authLogo').addEventListener('click', (e) => {
        e.preventDefault();
        logoClicks++;
        clearTimeout(logoClickTimer);
        logoClickTimer = setTimeout(() => { logoClicks = 0; }, 1200);
        if (logoClicks >= 5) {
          logoClicks = 0;
          revealAdmin();
        }
      });

      $('#adminTrigger').addEventListener('dblclick', revealAdmin);

      const session = Auth.getSession();
      if (session) {
        window.location.href = Auth.redirectForRole(session.role);
        return;
      }

      $('#loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = $('#loginEmail').value;
        const password = $('#loginPassword').value;
        const selectedRole = document.querySelector('input[name="loginRole"]:checked')?.value;
        const submitBtn = $('#loginSubmit');
        submitBtn.disabled = true;

        const result = await Auth.login(email, password);
        submitBtn.disabled = false;

        if (!result.ok) {
          showToast(result.error);
          return;
        }

        if (adminRevealed && result.user.role !== 'admin') {
          Auth.logout();
          showToast('This account is not an administrator.');
          return;
        }

        if (!adminRevealed && result.user.role === 'admin') {
          Auth.logout();
          showToast('Use the hidden admin entrance to sign in as admin.');
          return;
        }

        if (selectedRole === 'seller' && result.user.role === 'user') {
          showToast('This account is registered as a shopper, not a seller.');
          Auth.logout();
          return;
        }

        if (selectedRole === 'user' && result.user.role === 'seller') {
          showToast('This account is a seller. Select Seller to continue.');
          Auth.logout();
          return;
        }

        showToast(`Welcome back, ${result.user.name}!`);
        setTimeout(() => {
          const redirect = new URLSearchParams(window.location.search).get('redirect');
          window.location.href = redirect || Auth.redirectForRole(result.user.role);
        }, 600);
      });
    })();
  </script>
</body>
</html>
