<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders — Ecomma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page orders-page">
  <div class="auth-page__bg"></div>

  <main class="auth-page__main orders-page__main">
    <a href="index.html" class="logo auth-page__logo">
      <span class="logo__icon">E</span>
      <span class="logo__text">Ecomma</span>
    </a>

    <div class="auth-card auth-card--wide">
      <div class="auth-card__header">
        <h1>My Orders</h1>
        <p id="ordersSubtitle">Track status and payment history</p>
      </div>

      <div id="ordersEmpty" class="empty-state" hidden>
        <p>You have no orders yet.</p>
        <a href="index.html" class="btn btn--primary">Start shopping</a>
      </div>

      <div id="ordersList" class="orders-list"></div>

      <p class="auth-switch">
        <a href="index.html">← Back to marketplace</a>
      </p>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/api-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/orders.js"></script>
  <script src="js/orders-page.js"></script>
</body>
</html>
